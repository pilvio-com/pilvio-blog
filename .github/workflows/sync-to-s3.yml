# Copy this file to .github/workflows/sync-to-s3.yml in the CONTENT repo (pilvio-com/pilvio-blog)
#
# Required secrets on the content repo:
#   S3_ENDPOINT        — e.g. https://s3.pilw.io
#   S3_BUCKET          — e.g. pilvio-blog
#   S3_ACCESS_KEY_ID
#   S3_SECRET_ACCESS_KEY
#   GH_PAT             — GitHub PAT with access to the blog app repo (for cross-repo checkout)

name: Sync Blog Content to S3

on:
  push:
    branches: [main]
    paths: ['posts/**']
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content repo
        uses: actions/checkout@v4

      - name: Checkout blog app repo (for sync script)
        uses: actions/checkout@v4
        with:
          repository: pilvio-com/pilvio-cloud-scribe-blog
          path: blog-app
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sync script dependencies
        run: cd blog-app/scripts/sync-to-s3 && npm install

      - name: Sync content to S3
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: eu-west-1
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          CONTENT_DIR: ${{ github.workspace }}/posts
          GITHUB_RAW_URL: https://raw.githubusercontent.com/${{ github.repository }}/main
          COMMIT_SHA: ${{ github.sha }}
        run: node blog-app/scripts/sync-to-s3/sync.js
